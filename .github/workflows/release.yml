name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            pqc_lib: lib/linux_amd64/libqorepqc.so
          - goos: linux
            goarch: arm64
            pqc_lib: lib/linux_arm64/libqorepqc.so
          - goos: darwin
            goarch: amd64
            pqc_lib: lib/darwin_amd64/libqorepqc.dylib
          - goos: darwin
            goarch: arm64
            pqc_lib: lib/darwin_arm64/libqorepqc.dylib
          - goos: windows
            goarch: amd64
            pqc_lib: lib/windows_amd64/qorepqc.dll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build SX
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -o lightnode-sx-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/lightnode-sx/

      - name: Build UX
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -o lightnode-ux-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/lightnode-ux/

      - name: Package PQC library
        run: |
          if [ -f "${{ matrix.pqc_lib }}" ]; then
            cp "${{ matrix.pqc_lib }}" .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            lightnode-sx-*
            lightnode-ux-*
            libqorepqc.*
            qorepqc.*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
